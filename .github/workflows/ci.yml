name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Check formatting
        run: |
          gofmt -l . | tee /tmp/fmt.out
          test ! -s /tmp/fmt.out

      - name: Run vet
        run: go vet ./...

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Per-package coverage gate (>=80%, excluding cmd/lore)
        run: |
          awk '
            NR == 1 { next }                 # skip "mode: atomic" header
            {
              # Field 1 looks like "github.com/zpenka/lore/lore.go:19.20,24.16"
              # Strip everything from the first colon onward to get the file path,
              # then strip the trailing /<file>.go to get the package import path.
              split($1, a, ":"); file = a[1]
              pkg = file; sub(/\/[^\/]+$/, "", pkg)
              if (pkg == "github.com/zpenka/lore/cmd/lore") next
              total[pkg] += $2
              if ($3 > 0) hit[pkg] += $2
            }
            END {
              threshold = 80.0
              failed = 0; n = 0
              for (pkg in total) {
                cov = (total[pkg] > 0) ? (100.0 * hit[pkg] / total[pkg]) : 0
                status = (cov >= threshold) ? "PASS" : "FAIL"
                printf "%s: %s = %.1f%% (%d/%d statements)\n", status, pkg, cov, hit[pkg], total[pkg]
                if (cov < threshold) failed = 1
                n++
              }
              if (n == 0) { print "FAIL: no packages found in coverage profile"; exit 1 }
              exit failed
            }
          ' coverage.out

  fuzz:
    runs-on: ubuntu-latest
    # Non-blocking job: fuzz failures don't gate merges until the targets have
    # been green for a week; promote to required at that point.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Fuzz parseSessionMetadata (30s)
        run: go test -fuzz=FuzzParseSessionMetadata -fuzztime=30s -run=^$ github.com/zpenka/lore

      - name: Fuzz parseTurnsFromJSONL (30s)
        run: go test -fuzz=FuzzParseTurnsFromJSONL -fuzztime=30s -run=^$ github.com/zpenka/lore
